# =========================================================================
# ADMS Middleware — Docker Compose (production: DB eksternal + queue database)
#
# Arsitektur jaringan:
#   - scheduler                          -> network compose normal.
#   - vpn (L2TP/IPSec dial-out)          -> memegang tunnel ppp0.
#   - nginx, app & queue                 -> network_mode: service:vpn
#       * nginx reachable mesin ZKTeco via IP tunnel (polling ADMS, inbound)
#         dan via port host yang dipublish container vpn (di belakang Cloudflare).
#       * app (php-fpm) outbound TCP 4370 ke mesin (ZkSyncService sinkron
#         dari HTTP request); nginx mengaksesnya via 127.0.0.1:9000.
#       * queue worker outbound TCP 4370 ke mesin (job zk_sync.py).
#
# Catatan deploy:
#   - PostgreSQL DI LUAR VPS (DB_HOST di .env.docker = host DB eksternal).
#   - Queue & cache & session pakai driver DATABASE (tanpa Redis).
#   - HTTPS diterminasi Cloudflare (proxied). Origin melayani HTTP saja;
#     Laravel mempercayai header X-Forwarded-Proto (lihat bootstrap/app.php).
#
# Sebelum 'up': salin .env.docker.example -> .env.docker dan isi nilainya.
# Jalankan SELALU dengan: docker compose --env-file .env.docker <cmd>
# =========================================================================

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  target: runtime

# Rotasi log Docker agar tidak memenuhi disk di production.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  vpn:
    build:
      context: .
      dockerfile: docker/vpn/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/ppp:/dev/ppp
    # VPN_SERVER/PSK/USERNAME/PASSWORD/ROUTES dibaca langsung dari file ini,
    # jadi tidak bergantung pada flag --env-file saat interpolasi compose.
    env_file: .env.docker
    # Port web dipublish di sini karena nginx berbagi namespace service ini.
    # Cloudflare (proxied) menyambung ke VPS_IP:${WEB_PORT}. Untuk keamanan,
    # batasi port ini hanya dari IP range Cloudflare (firewall host).
    ports:
      - "${WEB_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "ip -4 addr show ppp0 2>/dev/null | grep -q 'inet '"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  app:
    build: *app-build
    image: adms-middleware:latest
    restart: unless-stopped
    logging: *default-logging
    env_file: .env.docker
    environment:
      CONTAINER_ROLE: app
    # Berbagi namespace vpn agar ZkSyncService (dipicu HTTP request, sinkron)
    # bisa outbound TCP 4370 ke mesin lewat tunnel. Tidak boleh punya
    # 'ports'/'networks' sendiri.
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy
    volumes:
      - storagedata:/var/www/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9000'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: adms-nginx:latest
    restart: unless-stopped
    logging: *default-logging
    # Berbagi namespace vpn: tidak boleh punya 'ports'/'networks' sendiri.
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy
      app:
        condition: service_healthy

  queue:
    build: *app-build
    image: adms-middleware:latest
    restart: unless-stopped
    logging: *default-logging
    env_file: .env.docker
    environment:
      CONTAINER_ROLE: worker
    # Outbound 4370 ke mesin lewat tunnel.
    network_mode: "service:vpn"
    volumes:
      - storagedata:/var/www/storage
    # --queue WAJIB menyebut 'attendance': job pengiriman absensi (SendAttendanceToTalenta,
    # ResendFailedAttendance) memakai onQueue('attendance'), dan queue:work tanpa flag ini
    # hanya menyimak antrean 'default' — jobnya akan mengendap selamanya tanpa error.
    # 'default' tetap disebut lebih dulu supaya job lain tak ikut terabaikan.
    command: ["php", "artisan", "queue:work", "--queue=default,attendance", "--tries=3", "--timeout=90", "--sleep=3", "--max-time=3600"]
    depends_on:
      app:
        condition: service_healthy
      vpn:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  scheduler:
    build: *app-build
    image: adms-middleware:latest
    restart: unless-stopped
    logging: *default-logging
    env_file: .env.docker
    environment:
      CONTAINER_ROLE: scheduler
    volumes:
      - storagedata:/var/www/storage
    # Loop schedule:run tiap menit (pengganti cron).
    command: ["bash", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    depends_on:
      app:
        condition: service_healthy

volumes:
  storagedata:

# ADMS Middleware — vhost nginx.
# Catatan: container nginx berbagi network namespace dengan service `vpn`
# (network_mode: service:vpn), sehingga:
#   - dijangkau mesin ZKTeco lewat IP tunnel (ppp0) di port 80 untuk polling ADMS;
#   - dijangkau admin lewat port host yang dipublish container `vpn`;
#   - php-fpm (`app`) juga berbagi namespace vpn, jadi diakses via
#     127.0.0.1:9000 (hostname `app` tidak lagi resolvable dari sini).
server {
    listen 80 default_server;
    server_name _;

    root /var/www/public;
    index index.php;

    client_max_body_size 25m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /dev/stdout;
    error_log /dev/stderr;
}
